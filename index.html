<!DOCTYPE html>
<html>
<head>
<title>Bulk Mail Sender</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
padding:20px;
}

.box{
background:white;
padding:25px;
border-radius:12px;
max-width:520px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:12px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
width:100%;
border-radius:6px;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="box">

<h2>Bulk Mail Sender</h2>

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="email" placeholder="Your Gmail">

<input type="password" id="pass" placeholder="App Password">

<input type="text" id="subject" placeholder="Subject">

<textarea id="message" placeholder="Message"></textarea>

<textarea id="list" placeholder="Emails (comma separated)"></textarea>

<button onclick="send()">Send Bulk Mail</button>

</div>

<script>

function send(){

fetch("/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name.value,
email:email.value,
pass:pass.value,
subject:subject.value,
message:message.value,
list:list.value
})

}).then(res=>res.text())
.then(data=>alert(data))

}

</script>

</body>
</html>
